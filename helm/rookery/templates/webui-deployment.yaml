{{- if .Values.webui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rookery.fullname" . }}-webui
  labels:
    {{- include "rookery.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "rookery.fullname" . }}-webui
    app.kubernetes.io/component: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "rookery.fullname" . }}-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "rookery.fullname" . }}-webui
        app.kubernetes.io/component: webui
        {{- include "rookery.labels" . | nindent 8 }}
    spec:
      {{- with .Values.webui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: webui
          image: "{{ .Values.webui.image.repository }}:{{ .Values.webui.image.tag }}"
          imagePullPolicy: {{ .Values.webui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Point Open WebUI at the Rookery leader's OpenAI-compatible API
            - name: OPENAI_API_BASE_URLS
              value: "http://{{ include "rookery.fullname" . }}-leader:{{ .Values.leader.service.port }}/v1"
            - name: OPENAI_API_KEYS
              value: "rookery"
            - name: WEBUI_AUTH
              value: "false"
            # Disable Ollama integration (we only use OpenAI-compatible)
            - name: ENABLE_OLLAMA_API
              value: "false"
          {{- with .Values.webui.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rookery.fullname" . }}-webui
  labels:
    {{- include "rookery.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "rookery.fullname" . }}-webui
    app.kubernetes.io/component: webui
spec:
  type: {{ .Values.webui.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "rookery.fullname" . }}-webui
  ports:
    - name: http
      port: {{ .Values.webui.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.webui.service.type "NodePort") .Values.webui.service.nodePort }}
      nodePort: {{ .Values.webui.service.nodePort }}
      {{- end }}
{{- end }}
