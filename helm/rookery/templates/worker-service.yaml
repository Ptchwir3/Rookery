apiVersion: v1
kind: Service
metadata:
  name: {{ include "rookery.fullname" . }}-worker
  labels:
    {{- include "rookery.workerLabels" . | nindent 4 }}
spec:
  # Headless service: no ClusterIP, returns individual pod IPs
  # This lets the leader discover workers via DNS:
  #   <pod-name>.<service-name>.<namespace>.svc.cluster.local
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "rookery.fullname" . }}-worker
  ports:
    - name: rpc
      port: {{ .Values.worker.port }}
      targetPort: rpc
      protocol: TCP
