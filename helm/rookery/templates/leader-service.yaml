apiVersion: v1
kind: Service
metadata:
  name: {{ include "rookery.fullname" . }}-leader
  labels:
    {{- include "rookery.leaderLabels" . | nindent 4 }}
spec:
  type: {{ .Values.leader.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "rookery.fullname" . }}-leader
  ports:
    - name: http
      port: {{ .Values.leader.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.leader.service.type "NodePort") .Values.leader.service.nodePort }}
      nodePort: {{ .Values.leader.service.nodePort }}
      {{- end }}
